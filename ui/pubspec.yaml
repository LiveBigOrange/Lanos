name: lanos
description: "局域网跨平台文件共享工具 - 让你像 AirDrop 一样在 Windows、macOS、Linux、Android、iOS 之间自由传输文件。"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # 系统集成（桌面）
  system_tray: ^2.0.3
  tray_manager: ^0.5.3
  flutter_local_notifications: ^22.1.0
  launch_at_startup: ^0.5.1
  local_notifier: ^0.1.6

  # 文件与路径
  file_selector: ^1.1.0
  file_picker: ^11.0.2
  path: ^1.9.0
  path_provider: ^2.1.6

  # UI 与二维码
  qr_flutter: ^4.1.0
  device_info_plus: ^12.4.0

  # 移动端独有
  image_picker: ^1.2.3
  mobile_scanner: ^7.4.0
  uni_links: ^0.5.1

  # 网络（桌面 SSE / 通用 HTTP）
  http: ^1.6.0

  # 国际化与本地存储
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  generate: true
