name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-core:
    name: Build gcd (${{ matrix.os }}/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, target: linux-amd64,  goos: linux,   goarch: amd64 }
          - { os: ubuntu-22.04, target: linux-arm64,  goos: linux,   goarch: arm64 }
          - { os: macos-13,     target: darwin-arm64, goos: darwin,  goarch: arm64 }
          - { os: macos-13,     target: darwin-amd64, goos: darwin,  goarch: amd64 }
          - { os: windows-2022, target: windows-amd64, goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: core/go.sum
      - name: Build gcd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o gcd${ext} ./cmd/gcd
          mkdir -p out
          tar -czf out/gcd-${{ matrix.target }}.tar.gz gcd${ext}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: gcd-${{ matrix.target }}
          path: core/out/gcd-${{ matrix.target }}.tar.gz

  build-windows:
    name: Build Windows installer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build Flutter Windows
        working-directory: ui
        run: flutter build windows --release
      - name: Build gcd
        working-directory: core
        run: go build -trimpath -ldflags="-s -w" -o gcd.exe ./cmd/gcd
      - name: Package with Inno Setup
        working-directory: scripts/build
        run: |
          # Install Inno Setup via chocolatey
          choco install innosetup --no-progress -y
          # Refresh PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          ./package-windows.ps1 -Version "${{ github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: scripts/build/dist/Lanos-Setup-*.exe

  build-macos:
    name: Build macOS DMG
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build Flutter macOS
        working-directory: ui
        run: flutter build macos --release
      - name: Build gcd universal
        working-directory: core
        run: |
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o gcd-amd64 ./cmd/gcd
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o gcd-arm64 ./cmd/gcd
          lipo -create -output gcd gcd-amd64 gcd-arm64
      - name: Package DMG
        working-directory: scripts/build
        run: ./package-macos.sh "${{ github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: scripts/build/dist/Lanos-*.dmg

  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm wget
      - name: Build Flutter Linux
        working-directory: ui
        run: flutter build linux --release
      - name: Build gcd
        working-directory: core
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o gcd ./cmd/gcd
      - name: Package Linux
        working-directory: scripts/build
        run: ./package-linux.sh "${{ github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            scripts/build/dist/*.AppImage
            scripts/build/dist/*.deb
            scripts/build/dist/*.rpm

  release:
    name: Create GitHub Release
    needs: [build-core, build-windows, build-macos, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble release
        run: |
          mkdir -p release
          # Core binaries
          for f in artifacts/gcd-*/gcd-*.tar.gz; do
            cp "$f" release/
          done
          # Installers
          cp artifacts/windows-installer/*.exe release/ 2>/dev/null || true
          cp artifacts/macos-dmg/*.dmg release/ 2>/dev/null || true
          cp artifacts/linux-packages/*.AppImage release/ 2>/dev/null || true
          cp artifacts/linux-packages/*.deb release/ 2>/dev/null || true
          cp artifacts/linux-packages/*.rpm release/ 2>/dev/null || true
          # Checksums
          cd release && sha256sum * > checksums.txt
      - uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
