name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-gcd:
    name: Build gcd (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, target: linux-amd64, goos: linux, goarch: amd64 }
          - { os: ubuntu-22.04, target: linux-arm64, goos: linux, goarch: arm64 }
          - { os: windows-2022, target: windows-amd64, goos: windows, goarch: amd64 }
          - { os: macos-13, target: darwin-universal, goos: darwin, goarch: universal }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: core/go.sum
      - name: Build gcd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          if [ "$GOARCH" = "universal" ]; then
            GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o gcd-amd64${ext} ./cmd/gcd
            GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o gcd-arm64${ext} ./cmd/gcd
            lipo -create -output gcd${ext} gcd-amd64${ext} gcd-arm64${ext}
          else
            go build -trimpath -ldflags="-s -w" -o gcd${ext} ./cmd/gcd
          fi
          mkdir -p out
          tar -czf out/gcd-${{ matrix.target }}.tar.gz gcd${ext}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: gcd-${{ matrix.target }}
          path: core/out/gcd-${{ matrix.target }}.tar.gz

  package-windows:
    name: Package Windows
    needs: [build-gcd]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: gcd-windows-amd64
          path: core
      - name: Extract gcd.exe
        working-directory: core
        run: tar -xzf gcd-windows-amd64.tar.gz
        shell: bash
      - name: Package with Inno Setup
        working-directory: scripts/build
        run: |
          choco install innosetup --no-progress -y
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          ./package-windows.ps1 -Version "${{ github.ref_name }}" -SkipBuild
      - name: Create portable ZIP
        working-directory: core
        run: Compress-Archive -Path gcd.exe -DestinationPath ../scripts/build/dist/Lanos-${{ github.ref_name }}-windows-portable.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            scripts/build/dist/Lanos-Setup-*.exe
            scripts/build/dist/Lanos-*-portable.zip

  package-linux:
    name: Package Linux
    needs: [build-gcd]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: gcd-linux-amd64
          path: core
      - name: Extract gcd
        working-directory: core
        run: tar -xzf gcd-linux-amd64.tar.gz
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y rpm wget
      - name: Package Linux
        working-directory: scripts/build
        run: ./package-linux.sh "${{ github.ref_name }}" skip-build
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            scripts/build/dist/*.deb
            scripts/build/dist/*.rpm

  release:
    name: Create GitHub Release
    needs: [build-gcd, package-windows, package-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble release
        run: |
          mkdir -p release
          for f in artifacts/gcd-*/gcd-*.tar.gz; do
            cp "$f" release/
          done
          cp artifacts/windows-packages/*.exe release/ 2>/dev/null || true
          cp artifacts/windows-packages/*.zip release/ 2>/dev/null || true
          cp artifacts/linux-packages/*.deb release/ 2>/dev/null || true
          cp artifacts/linux-packages/*.rpm release/ 2>/dev/null || true
          cd release && sha256sum * > checksums.txt
      - uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
