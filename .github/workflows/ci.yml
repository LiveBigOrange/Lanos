name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint-test:
    name: Go vet + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: core/go.sum
      - run: go vet ./...
      - run: go test -race -timeout 120s ./...
      - run: test -z "$(gofmt -l .)"

  flutter-lint-test:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27"
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib test integration_test
      - run: flutter analyze --fatal-infos
      - run: flutter test

  build:
    name: Build (${{ matrix.os }})
    needs: [go-lint-test, flutter-lint-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            script: scripts/build/package-linux.sh
            asset-name: Lanos-linux-x86_64
          - os: macos-latest
            script: scripts/build/package-macos.sh
            asset-name: Lanos-macos-x86_64
          - os: windows-latest
            script: scripts/build/package-windows.ps1
            asset-name: Lanos-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: core/go.sum
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27"
          cache: true
      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --no-progress

      - run: ${{ matrix.script }}
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: scripts/build/dist/*

  release:
    name: Draft Release
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: "*"
          draft: true
          generate_release_notes: true
